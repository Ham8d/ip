workflows:
  ios-dylib-build:
    name: Build iOS Dylib using Theos
    max_build_duration: 20
    instance_type: mac_mini_m1
    environment:
      vars:
        THEOS: $CM_BUILD_DIR/theos
    scripts:
      - name: Install Theos and iOS SDKs
        script: |
          echo "[-] Cloning Theos..."
          git clone --recursive https://github.com/theos/theos.git $THEOS

          echo "[-] Cloning iOS SDKs..."
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/*.sdk $THEOS/sdks/
          rm -rf /tmp/theos-sdks

      - name: Build Tweak (Dylib + Deb)
        script: |
          echo "[-] Compiling Tweak..."
          make package FINALPACKAGE=1

          echo "[-] Extracting dylib from .deb..."
          DEB_FILE=$(ls packages/*.deb 2>/dev/null | head -1)

          if [ -n "$DEB_FILE" ]; then
            mkdir -p /tmp/deb_extract
            cp "$DEB_FILE" /tmp/deb_extract/pkg.deb
            cd /tmp/deb_extract
            ar x pkg.deb

            if [ -f data.tar.gz ]; then
              tar -xzf data.tar.gz
            elif [ -f data.tar.xz ]; then
              tar -xJf data.tar.xz
            elif [ -f data.tar.lzma ]; then
              tar --lzma -xf data.tar.lzma
            fi

            DYLIB_PATH=$(find . -name "*.dylib" | head -1)
            if [ -n "$DYLIB_PATH" ]; then
              cp "$DYLIB_PATH" "$CM_BUILD_DIR/ChangeIP.dylib"
              echo "✅ Dylib extracted: $DYLIB_PATH"
            else
              echo "⚠️ Dylib not found inside .deb"
            fi
            cd "$CM_BUILD_DIR"
          else
            echo "⚠️ No .deb file found in packages/"
          fi

    artifacts:
      - ChangeIP.dylib
      - packages/*.deb
