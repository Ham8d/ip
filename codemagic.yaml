workflows:
  ios-dylib-build:
    name: Build iOS Dylib using Theos
    max_build_duration: 20
    instance_type: mac_mini_m1
    environment:
      vars:
        THEOS: $CM_BUILD_DIR/theos
    scripts:
      - name: Install Theos and iOS SDKs
        script: |
          echo "[-] Cloning Theos..."
          git clone --recursive https://github.com/theos/theos.git $THEOS

          echo "[-] Cloning iOS SDKs..."
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/*.sdk $THEOS/sdks/
          rm -rf /tmp/theos-sdks

      - name: Build Tweak (Dylib)
        script: |
          echo "[-] Compiling Tweak..."
          make package FINALPACKAGE=1

          echo "[-] Copying dylib artifact..."
          DYLIB_PATH=$(find .theos/obj -name "*.dylib" | head -1)
          if [ -n "$DYLIB_PATH" ]; then
            cp "$DYLIB_PATH" ./ChangeIP.dylib
            echo "Found dylib at: $DYLIB_PATH"
          else
            echo "WARNING: No dylib found in .theos/obj"
          fi

    artifacts:
      - ./*.dylib
      - packages/*.deb
