workflows:
  ios-dylib-build:
    name: Build iOS Dylib using Theos
    max_build_duration: 20
    instance_type: mac_mini_m1
    environment:
      vars:
        THEOS: $CM_BUILD_DIR/theos
    scripts:
      - name: Install Theos and iOS SDKs
        script: |
          echo "[-] Installing ldid..."
          brew install ldid

          echo "[-] Cloning Theos..."
          git clone --recursive https://github.com/theos/theos.git $THEOS

          echo "[-] Cloning iOS SDKs..."
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -r /tmp/theos-sdks/*.sdk $THEOS/sdks/
          rm -rf /tmp/theos-sdks

      - name: Build Dylib
        script: |
          echo "[-] Building dylib..."
          make

          DYLIB=$(find .theos/obj -name "*.dylib" | head -1)
          if [ -n "$DYLIB" ]; then
            cp "$DYLIB" ./ChangeIP.dylib
            echo "✅ Dylib found: $DYLIB"
          else
            echo "❌ Dylib not found — listing .theos:"
            find .theos -name "*.dylib"
            exit 1
          fi

      - name: Build Final Package (.deb)
        script: |
          echo "[-] Building .deb package..."
          make package FINALPACKAGE=1

    artifacts:
      - ChangeIP.dylib
      - packages/*.deb
